# Local development Postgres. Start with: docker compose up -d
# Then set DATABASE_URL in backend/.env to:
#   postgresql://postgres:postgres@localhost:5432/vutto?schema=public
services:
  db:
    image: postgres:16-alpine
    container_name: vutto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vutto
    ports:
      - '5432:5432'
    volumes:
      - vutto_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  vutto_pgdata:
